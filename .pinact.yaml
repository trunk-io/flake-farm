# yaml-language-server: $schema=https://raw.githubusercontent.com/suzuki-shunsuke/pinact/refs/heads/main/json-schema/pinact.json
# pinact - https://github.com/suzuki-shunsuke/pinact
version: 3
# min_age:
#   value: 7      # threshold in days
#   always: true  # also run the passive audit on every `pinact run` (extra GitHub API calls)
# separator: "  # "
# files:
#   - pattern: action.yaml
#   - pattern: */action.yaml

rules:
  - ignore: true
    conditions:
      - expr: |
          ActionRepoFullName == "trunk-io/analytics-uploader"
      - expr: |
          ActionRepoFullName == "dtolnay/rust-toolchain" && ActionVersion == "nightly"
