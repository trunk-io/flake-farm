name: Bazel Tests

permissions: read-all

on:
  schedule:
    - cron: 0 */6 * * *
  pull_request: {}

jobs:
  bazel_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1      - uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0        uses: bazelbuild/setup-bazelisk@v3

      - name: Run tests
        run: bazel test //bazel/gtest:hello_test --build_event_json_file=build_events.json
        continue-on-error: true

      - name: Upload results
        # Run this step even if the test step ahead fails
        if: ${{ always() }}
        uses: trunk-io/analytics-uploader@main
        continue-on-error: true
        with:
          bazel-bep-path: build_events.json
          org-slug: trunk
          token: ${{ secrets.TRUNK_TOKEN }}
