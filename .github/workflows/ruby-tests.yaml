name: Ruby Tests

on:
  schedule:
    - cron: 0 */6 * * *
  pull_request: {}
  workflow_dispatch:
    inputs:
      rspec_trunk_flaky_tests_version:
        description: "Version of rspec_trunk_flaky_tests gem to use (e.g., 0.12.5)"
        required: false
        type: string

jobs:
  ruby_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Override rspec_trunk_flaky_tests version
        if: ${{ inputs.rspec_trunk_flaky_tests_version }}
        run: |
          sed -i "s/gem 'rspec_trunk_flaky_tests'.*/gem 'rspec_trunk_flaky_tests', '${{ inputs.rspec_trunk_flaky_tests_version }}'/" Gemfile
          cat Gemfile

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: 3.4.7
          bundler-cache: ${{ !inputs.rspec_trunk_flaky_tests_version }}

      - name: Install dependencies with custom gem version
        if: ${{ inputs.rspec_trunk_flaky_tests_version }}
        run: bundle install

      # this is the recommended way to run rspec tests using the trunk rspec plugin
      - name: Run rspec tests (with trunk rspec plugin)
        id: rspec_trunk_tests
        if: ${{ always() }}
        working-directory: ruby/trunk_rspec
        env:
          TRUNK_PUBLIC_API_ADDRESS: ${{ vars.TRUNK_API_ENDPOINT }}
          TRUNK_ORG_URL_SLUG: ${{ vars.ORG_SLUG }}
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_TOKEN }}
        run: bundle exec rspec
        continue-on-error: true

      - name: Run rspec tests
        id: rspec_tests
        if: ${{ always() }}
        run: bundle exec rspec ruby/rspec --format RspecJunitFormatter --out rspec_test.xml
        continue-on-error: true

      - name: Process rspec results
        # Run this step even if the test step ahead fails
        if: ${{ always() }}
        uses: trunk-io/analytics-uploader@main
        env:
          TRUNK_PUBLIC_API_ADDRESS: ${{ vars.TRUNK_API_ENDPOINT }}
        with:
          # Path to your test results.
          junit-paths: "**/rspec_test.xml"
          # Provide your Trunk organization slug.
          org-slug: ${{ vars.ORG_SLUG }}
          # Provide your Trunk API token as a GitHub secret.
          token: ${{ secrets.TRUNK_TOKEN }}
          # Pass the test outcome for quarantining support
          previous-step-outcome: ${{ steps.rspec_tests.outcome }}
          test-collection-id: SrV9Xppx

      - name: Run minitest tests
        id: minitest_tests
        if: ${{ always() }}
        run: bundle exec ruby ruby/minitest/mixer.rb
        continue-on-error: true

      - name: Process minitest results
        # Run this step even if the test step ahead fails
        if: ${{ always() }}
        uses: trunk-io/analytics-uploader@main
        env:
          TRUNK_PUBLIC_API_ADDRESS: ${{ vars.TRUNK_API_ENDPOINT }}
        with:
          # Path to your test results.
          junit-paths: "**/ruby/minitest/results/*.xml"
          # Provide your Trunk organization slug.
          org-slug: ${{ vars.ORG_SLUG }}
          # Provide your Trunk API token as a GitHub secret.
          token: ${{ secrets.TRUNK_TOKEN }}
          # Pass the test outcome for quarantining support
          previous-step-outcome: ${{ steps.minitest_tests.outcome }}
          test-collection-id: SrV9Xppx

      - name: Upload JUnit XML artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ruby-junit-results
          path: |
            **/rspec_test.xml
            **/ruby/minitest/results/*.xml
          retention-days: 7
