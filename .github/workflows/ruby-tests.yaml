name: Ruby Tests

on:
  schedule:
    - cron: 0 */6 * * *
  pull_request: {}

jobs:
  ruby_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.7
          bundler-cache: true

      - name: Run rspec tests
        if: ${{ always() }}
        run: bundle exec rspec ruby/rspec --format RspecJunitFormatter --out rspec_test.xml

      - name: Run rspec tests (with trunk rspec plugin)
        if: ${{ always() }}
        working-directory: ruby/trunk_rspec
        env:
          TRUNK_ORG_URL_SLUG: trunk
          TRUNK_API_TOKEN: ${{ secrets.TRUNK_TOKEN }}
        run: bundle exec rspec

      - name: Run minitest tests
        if: ${{ always() }}
        run: bundle exec ruby ruby/minitest/mixer.rb

      - name: Upload results
        # Run this step even if the test step ahead fails
        if: ${{ always() }}
        uses: trunk-io/analytics-uploader@main
        with:
          # Path to your test results.
          junit-paths: "**/rspec_test.xml,**/ruby/minitest/results/*.xml"
          # Provide your Trunk organization slug.
          org-slug: trunk
          # Provide your Trunk API token as a GitHub secret.
          token: ${{ secrets.TRUNK_TOKEN }}
        continue-on-error: true

      - name: Upload JUnit XML artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2        uses: actions/upload-artifact@v4
        with:
          name: ruby-junit-results
          path: |
            **/rspec_test.xml
            **/ruby/minitest/results/*.xml
          retention-days: 7
