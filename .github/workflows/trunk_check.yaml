name: Trunk Check

on:
  pull_request:

permissions:
  contents: read
  # Required for Trunk to post annotations
  checks: write

jobs:
  trunk_check:
    name: Trunk Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1        uses: actions/checkout@v4

      - name: Trunk Check
        uses: trunk-io/trunk-action@75699af9e26881e564e9d832ef7dc3af25ec031b # v1.2.4        uses: trunk-io/trunk-action@v1
        with:
          cache: false
          timeout-seconds: 1500 # 25 minutes in seconds
          cat-trunk-debug-logs: true
          github-token: ${{ github.token }}
          debug: true
