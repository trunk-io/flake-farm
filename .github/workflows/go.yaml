name: GoLang Tests

on:
  schedule:
    - cron: 0 */6 * * *
  pull_request: {}

jobs:
  go_test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3      - uses: actions/checkout@v4      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1      - uses: actions/checkout@v4
      - name: Setup Go Action
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0        uses: actions/setup-go@v5        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0        uses: actions/setup-go@v5
        with:
          go-version: 1.22.5
      - name: Install dependencies
        run: |
          go install github.com/jstemmer/go-junit-report/v2@latest
          go install gotest.tools/gotestsum@latest

      - name: Run tests with go-junit-report
        shell: bash
        run: GORUNNER=NONE go test -v 2>&1 | go-junit-report -out go-junit-report_test.xml
        working-directory: go/src
        continue-on-error: true

      - name: Run tests with gotestsum
        id: run_tests
        if: ${{ always() }}
        shell: bash
        env:
          GORUNNER: GOTESTSUM
        # we pass in env GORUNNER so that a unique retry file will be created
        run: gotestsum --rerun-fails=3 --junitfile go-gotestsum_test.xml
        working-directory: go/src
        continue-on-error: true

      - name: Process test results
        # Run this step even if the test step ahead fails
        if: ${{ always() }}
        uses: trunk-io/analytics-uploader@main
        env:
          TRUNK_PUBLIC_API_ADDRESS: ${{ vars.TRUNK_API_ENDPOINT }}
        with:
          cli-version: ${{ vars.ANALYTICS_CLI_PRE_RELEASE_TEST_VERSION }}
          # Path to your test results.
          junit-paths: "**/go-*_test.xml"
          # Provide your Trunk organization slug.
          org-slug: ${{ vars.ORG_SLUG }}
          # Provide your Trunk API token as a GitHub secret.
          token: ${{ secrets.TRUNK_TOKEN }}
          # Pass the test outcome for quarantining support
          previous-step-outcome: ${{ steps.run_tests.outcome }}
          test-collection-id: KOq4cED4

      - name: Upload JUnit XML artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1        uses: actions/upload-artifact@v4        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2        uses: actions/upload-artifact@v4
        with:
          name: go-junit-results
          path: "**/go-*_test.xml"
          retention-days: 7
